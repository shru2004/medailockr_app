name: flutter_mediqly
description: "MedAILockr – Simple, Secure, Smarter Healthcare Flutter App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # QR Code
  qr_flutter: ^4.1.0

  # Charts (replaces recharts)
  fl_chart: ^0.68.0

  # AI (Google Generative AI Dart SDK – replaces @google/genai JS SDK)
  google_generative_ai: ^0.4.6

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.6

  # Permissions
  permission_handler: ^11.3.1

  # Speech & TTS (replaces Web Speech API and SpeechSynthesis)
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5

  # SVG support
  flutter_svg: ^2.0.10+1

  # Icons
  cupertino_icons: ^1.0.8

  # Miscellaneous
  mime: ^2.0.0
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
